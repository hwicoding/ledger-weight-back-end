name: Deploy Ledger Weight Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        id: sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ env.SHORT_SHA }}

  deploy-to-nas:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Connect to Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TS_AUTH_KEY }} --accept-routes
          sleep 5
          tailscale status

      - name: Deploy on NAS (docker compose)
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: 100.88.40.125
          username: ${{ secrets.NAS_SERVER_USER }}
          key: ${{ secrets.NAS_SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /home/iwh/ledger-weight
            docker compose pull
            docker compose up -d
            echo "Deployment completed at $(date)"
